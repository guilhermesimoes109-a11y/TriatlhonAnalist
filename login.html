<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iTX — Iniciar Sessão</title>
  <meta name="description" content="Inicia sessão ou cria conta no iTX para aceder ao teu dashboard de triathlon."/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 80px 24px;
    }
    .auth-glow-1 {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: var(--primary); filter: blur(160px); opacity: 0.1;
      top: -150px; right: -100px;
    }
    .auth-glow-2 {
      position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: var(--secondary); filter: blur(140px); opacity: 0.1;
      bottom: -100px; left: -80px;
    }
    .auth-container {
      width: 100%; max-width: 440px; position: relative; z-index: 2;
    }
    .auth-logo {
      text-align: center; margin-bottom: 36px;
    }
    .auth-logo a {
      font-size: 2.5rem; font-weight: 900; letter-spacing: -2px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-logo p {
      font-size: 0.9rem; color: var(--text-muted); margin-top: 8px;
    }
    .auth-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px;
      box-shadow: 0 16px 64px rgba(0,0,0,0.4);
      animation: fadeInUp 0.6s ease;
    }
    .auth-tabs {
      display: flex; gap: 4px; margin-bottom: 28px;
      background: var(--glass); border-radius: 50px; padding: 4px;
      border: 1px solid var(--glass-border);
    }
    .auth-tab {
      flex: 1; padding: 10px 0; border: none; border-radius: 50px;
      background: transparent; color: var(--text-muted); font-family: var(--font);
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: var(--transition);
    }
    .auth-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
    }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-form.hidden { display: none; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label {
      font-size: 0.82rem; font-weight: 600; color: var(--text-muted);
    }
    .auth-field input {
      padding: 13px 16px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      color: var(--text); font-family: var(--font); font-size: 0.95rem;
      transition: var(--transition); outline: none;
    }
    .auth-field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }
    .auth-field input::placeholder { color: rgba(255,255,255,0.2); }
    .auth-submit {
      padding: 14px; border-radius: 50px; font-weight: 700; font-size: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; cursor: pointer; transition: var(--transition);
      margin-top: 4px; position: relative; overflow: hidden;
    }
    .auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,255,0.3);
    }
    .auth-submit:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none;
    }
    .auth-submit .spinner {
      display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    .auth-submit.loading .btn-text { display: none; }
    .auth-submit.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-divider {
      display: flex; align-items: center; gap: 16px;
      color: var(--text-muted); font-size: 0.8rem; margin: 4px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .auth-social-btns { display: flex; gap: 12px; }
    .auth-social-btn {
      flex: 1; padding: 12px; border-radius: var(--radius-sm);
      background: var(--glass); border: 1px solid var(--glass-border);
      color: var(--text); font-family: var(--font); font-size: 0.88rem;
      font-weight: 600; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .auth-social-btn:hover {
      background: rgba(255,255,255,0.08); border-color: var(--primary);
    }
    .auth-error {
      display: none; padding: 12px 16px; border-radius: var(--radius-sm);
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444; font-size: 0.85rem; text-align: center;
    }
    .auth-error.show { display: block; animation: fadeInDown 0.3s ease; }
    .auth-success {
      display: none; padding: 12px 16px; border-radius: var(--radius-sm);
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      color: #22c55e; font-size: 0.85rem; text-align: center;
    }
    .auth-success.show { display: block; animation: fadeInDown 0.3s ease; }
    .auth-footer {
      text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-muted);
    }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .forgot-link {
      font-size: 0.82rem; color: var(--primary); text-align: right;
      cursor: pointer; background: none; border: none; font-family: var(--font);
      padding: 0;
    }
    .forgot-link:hover { color: var(--accent); }

    /* Password strength */
    .password-strength { display: flex; gap: 4px; margin-top: 4px; }
    .strength-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--glass-border); transition: var(--transition); }
    .strength-bar.weak { background: var(--z5); }
    .strength-bar.medium { background: var(--z3); }
    .strength-bar.strong { background: var(--z2); }
    .strength-text { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    /* Reset password modal */
    .reset-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 9999;
      align-items: center; justify-content: center; padding: 24px;
    }
    .reset-overlay.show { display: flex; }
    .reset-modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px; max-width: 400px; width: 100%;
      animation: fadeInUp 0.4s ease;
    }
    .reset-modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .reset-modal p { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 20px; }
    .reset-close {
      position: absolute; top: 16px; right: 16px; background: none; border: none;
      color: var(--text-muted); font-size: 1.2rem; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar scrolled" id="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo">iTX</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="teams.html">Equipas</a></li>
      <li><a href="download.html">Download</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<!-- AUTH PAGE -->
<section class="auth-page">
  <div class="auth-glow-1"></div>
  <div class="auth-glow-2"></div>

  <div class="auth-container">
    <div class="auth-logo">
      <a href="index.html">iTX</a>
      <p>Análise biométrica para triatletas</p>
    </div>

    <div class="auth-card">
      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sessão</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Criar Conta</button>
      </div>

      <!-- ERROR/SUCCESS MESSAGES -->
      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <!-- LOGIN FORM -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="o.teu@email.com" required/>
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6"/>
        </div>
        <button type="button" class="forgot-link" onclick="showResetModal()">Esqueceste a password?</button>
        <button type="submit" class="auth-submit" id="loginBtn">
          <span class="btn-text">Entrar</span>
          <div class="spinner"></div>
        </button>
        <div class="auth-divider">ou continua com</div>
        <div class="auth-social-btns">
          <button type="button" class="auth-social-btn" onclick="handleSocialLogin('google')">🔵 Google</button>
          <button type="button" class="auth-social-btn" onclick="handleSocialLogin('github')">⚫ GitHub</button>
        </div>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
        <div class="auth-field">
          <label for="regName">Nome Completo</label>
          <input type="text" id="regName" placeholder="O teu nome" required/>
        </div>
        <div class="auth-field">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="o.teu@email.com" required/>
        </div>
        <div class="auth-field">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6" oninput="checkPasswordStrength(this.value)"/>
          <div class="password-strength">
            <div class="strength-bar" id="str1"></div>
            <div class="strength-bar" id="str2"></div>
            <div class="strength-bar" id="str3"></div>
            <div class="strength-bar" id="str4"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>
        <div class="auth-field">
          <label for="regConfirm">Confirmar Password</label>
          <input type="password" id="regConfirm" placeholder="Repete a password" required minlength="6"/>
        </div>
        <button type="submit" class="auth-submit" id="registerBtn">
          <span class="btn-text">Criar Conta</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="index.html">← Voltar ao site</a>
    </div>
  </div>
</section>

<!-- RESET PASSWORD MODAL -->
<div class="reset-overlay" id="resetOverlay">
  <div class="reset-modal" style="position:relative;">
    <button class="reset-close" onclick="closeResetModal()">✕</button>
    <h3>Recuperar Password</h3>
    <p>Introduz o teu email e enviaremos um link para redefinir a tua password.</p>
    <form onsubmit="handleResetPassword(event)" style="display:flex; flex-direction:column; gap:14px;">
      <div class="auth-field">
        <input type="email" id="resetEmail" placeholder="o.teu@email.com" required/>
      </div>
      <button type="submit" class="auth-submit" id="resetBtn">
        <span class="btn-text">Enviar Link</span>
        <div class="spinner"></div>
      </button>
    </form>
    <div class="auth-success" id="resetSuccess" style="margin-top:12px;"></div>
  </div>
</div>

<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
